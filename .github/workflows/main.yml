name: Ecommerce App CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  #CI
  build:
    # This job will run on every push and pull request to the main branch. It will check out the code, set up Node.js, install dependencies, run tests, and build the application.
    runs-on: ubuntu-latest
    steps:
      #step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      #step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      #step 3: Install dependencies
      - name: Install dependencies
        run: npm install
      #step 4: Run tests
      - name: Run tests
        run: npm test
      #step 5: Build application
      - name: Build application
        run: npm run build
  #CD
  deploy:
    # This job will run only on pushes to the main branch. It will check out the code, set up Node.js, install dependencies, build the application, and deploy it to a hosting service (e.g., Vercel).
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      #step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      #step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      #step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      #step 4: Build application
      #- name: Build application
      # run: npm run build

      #step 5: Deploy to Vercel (or any hosting service)
      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
